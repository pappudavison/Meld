          name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init metroproto only
        run: git submodule update --init metroproto

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup and Generate Protobuf
        uses: ./.github/actions/setup-protobuf

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleFossDebug -x lint --warning-mode summary
        env:
          METROLIST_APPLICATION_ID: com.meld.app
          METROLIST_APP_NAME: Meld
          LASTFM_API_KEY: dummy
          LASTFM_SECRET: dummy

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Meld-APK
          path: app/build/outputs/apk/foss/debug/*.apk
